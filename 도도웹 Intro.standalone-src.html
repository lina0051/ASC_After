<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>도도웹 — Quiet websites that outlast trends.</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="colors_and_type.css">
  <meta name="ext-resource-dependency" content="assets/brand-hero.png" data-resource-id="brandHero" />
  <meta name="ext-resource-dependency" content="assets/brand-video-still.jpg" data-resource-id="brandStill" />
  <style>
    html, body { margin: 0; padding: 0; background: #000; color: #fff; }
    body { font-family: "Inter", sans-serif; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
    #root { min-height: 100vh; }
    section { box-sizing: border-box; }
    em { font-style: italic; }
    a { color: inherit; }
    @keyframes dodoMarquee {
      from { transform: translateX(0); }
      to   { transform: translateX(-33.3333%); }
    }
    @keyframes dodoPulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.4; transform: scale(0.85); }
    }
  </style>
  <template id="__bundler_thumbnail" data-bg-color="#000000">
    <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
      <rect width="1200" height="800" fill="#000000"/>
      <text x="600" y="440" text-anchor="middle" font-family="Anta, sans-serif" font-size="180" fill="#ffffff" letter-spacing="2">DODOWEB.</text>
      <circle cx="900" cy="430" r="14" fill="#8CFF2E"/>
    </svg>
  </template>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body class="dx">
  <div id="root"></div>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="Sections.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "accentColor": "#8CFF2E",
      "showNav": true,
      "showMarquee": true,
      "showFaq": true
    }/*EDITMODE-END*/;

    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
      return (
        <div data-screen-label="DODOWEB Marketing">
          {t.showNav && <NavBar accentColor={t.accentColor} />}
          <Hero accentColor={t.accentColor} />
          {t.showMarquee && <Marquee accentColor={t.accentColor} />}
          <Services accentColor={t.accentColor} />
          <Works accentColor={t.accentColor} />
          <Process accentColor={t.accentColor} />
          <About accentColor={t.accentColor} />
          {t.showFaq && <Faq accentColor={t.accentColor} />}
          <Contact accentColor={t.accentColor} />
          <Footer accentColor={t.accentColor} />
          <TweaksPanel title="Tweaks">
            <TweakSection label="Accent" />
            <TweakColor label="Signal color" value={t.accentColor}
              onChange={(v) => setTweak('accentColor', v)} />
            <TweakSection label="Sections" />
            <TweakToggle label="Sticky nav" value={t.showNav}
              onChange={(v) => setTweak('showNav', v)} />
            <TweakToggle label="Marquee strip" value={t.showMarquee}
              onChange={(v) => setTweak('showMarquee', v)} />
            <TweakToggle label="FAQ section" value={t.showFaq}
              onChange={(v) => setTweak('showFaq', v)} />
          </TweaksPanel>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
